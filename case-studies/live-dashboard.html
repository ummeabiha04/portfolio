<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live NICU Dashboard</title>
    <style>
        :root {
            /* Matched colors from image */
            --bg-dark: #1a1b1e;
            --sidebar-bg: #222327;
            /* Slightly lighter sidebar */
            --card-bg: #0f0f0f;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --accent-blue: #7F8CFF;
            /* Selection color */

            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 100px;
            /* Wider for text */
            background-color: var(--sidebar-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* Logo */
        .logo-container {
            width: 60px;
            height: 60px;
            background: #2a2a2a;
            /* Placeholder dark circle */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            border: 1px solid #444;
        }

        .logo-svg {
            width: 35px;
            height: 35px;
            fill: #ff9f43;
            /* Orange accent for ShishuCare? */
        }

        /* Nav Items */
        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            align-items: center;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #666;
            cursor: pointer;
            width: 100%;
            position: relative;
            padding: 10px 0;
            transition: 0.3s;
        }

        .nav-item:hover {
            color: #aaa;
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(127, 140, 255, 0.1) 0%, transparent 100%);
            border-left: 3px solid var(--accent-blue);
            color: #fff;
        }

        .nav-icon {
            width: 28px;
            height: 28px;
            margin-bottom: 6px;
            fill: currentColor;
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 500;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            background: #151515;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a2a2a;
        }

        .header-left h1 {
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            color: #fff;
            text-transform: uppercase;
        }

        .header-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Right Header Area: Time + Icons */
        .header-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .time-date {
            text-align: right;
            font-size: 0.85rem;
            color: #bbb;
            line-height: 1.4;
            border-right: 1px solid #444;
            padding-right: 20px;
        }

        .header-icons {
            display: flex;
            gap: 15px;
        }

        .header-icon {
            width: 24px;
            height: 24px;
            fill: #888;
            cursor: pointer;
            transition: 0.2s;
        }

        .header-icon:hover {
            fill: #fff;
        }


        /* Grid Layout */
        .patient-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            overflow-y: auto;
            padding-right: 10px;
            padding-bottom: 20px;
        }

        /* Scrollbar */
        .patient-grid::-webkit-scrollbar {
            width: 6px;
        }

        .patient-grid::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .patient-grid::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }


        /* Patient Card */
        .patient-card {
            background-color: #0d0d0d;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }

        .patient-card.critical {
            border: 1px solid #d63031;
            box-shadow: 0 0 0 1px #d63031 inset;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: baseline;
        }

        .patient-name {
            font-size: 0.9rem;
            color: #fff;
            font-weight: 700;
        }

        .patient-name span {
            color: #aaa;
            font-weight: 400;
            margin-right: 4px;
            font-size: 0.8rem;
        }

        .patient-id {
            font-size: 0.75rem;
            color: #666;
        }

        /* Vitals Grid */
        .vitals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 15px;
            row-gap: 15px;
        }

        .vital-item {
            display: flex;
            align-items: center;
        }

        .vital-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .vital-icon.liver {
            background-color: #0b2e2e;
            color: #00b894;
        }

        .vital-icon.lung {
            background-color: #0a1b3d;
            color: #2e86de;
        }

        .vital-icon.temp {
            background-color: #331010;
            color: #ff4757;
        }

        .vital-icon.heart {
            background-color: #331e1e;
            color: #ff6b6b;
        }

        .vital-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Specific tweaks for outline icons */
        .vital-icon.lung svg,
        .vital-icon.liver svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .vital-data {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .vital-value {
            font-size: 1.25rem;
            font-weight: 500;
            color: #ddd;
            line-height: 1;
            margin-bottom: 2px;
        }

        .vital-unit {
            font-size: 0.6rem;
            color: #666;
            margin-left: 2px;
        }

        .value-row {
            display: flex;
            align-items: baseline;
        }

        .text-red {
            color: #ff4d4d !important;
        }

        .text-yellow {
            color: #fdcb6e !important;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <!-- Logo -->
        <div class="logo-container" style="background: transparent; border: none; overflow: visible;">
            <img src="shishucare-logo.png" alt="ShishuCare Logo"
                style="width: 100%; height: 100%; object-fit: contain;">
        </div>

        <nav class="nav-items">
            <!-- Neonatal IPD (Active) -->
            <div class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <path
                        d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
                </svg>
                <span class="nav-label">Neonatal IPD</span>
            </div>

            <!-- Calendar -->
            <div class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <path
                        d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z" />
                </svg>
                <span class="nav-label">Calendar</span>
            </div>

            <!-- Patient History -->
            <div class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <path
                        d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
                </svg>
                <span class="nav-label">Patient History</span>
            </div>

            <!-- Schedule -->
            <div class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z" />
                </svg>
                <span class="nav-label">Schedule</span>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <h1>PATIENT DIRECTORY</h1>
                <div class="header-subtitle">Neonatal IPD, AIIMS Jodhpur</div>
            </div>

            <div class="header-right">
                <div class="time-date">
                    <div style="margin-bottom: 4px;">Time: <span id="time">12:48:55</span></div>
                    <div>Date: 10/02/25</div>
                </div>
                <div class="header-icons">
                    <!-- Settings -->
                    <svg class="header-icon" viewBox="0 0 24 24">
                        <path
                            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L5.09 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                    </svg>
                    <!-- Support (Headset) -->
                    <svg class="header-icon" viewBox="0 0 24 24">
                        <path
                            d="M21 12.2l-2.54.49c-1.77.34-3.46 2.06-3.46 3.81 0 1.93 1.57 3.5 3.5 3.5h.5c.83 0 1.5-.67 1.5-1.5v-5c0-.62-.39-1.15-.93-1.39l.93-.91zM9 16.5c0-1.75-1.69-3.47-3.46-3.81L3 12.2v4.29c.54.24.93.77.93 1.39v5c0 .83.67 1.5 1.5 1.5h.5c1.93 0 3.5-1.57 3.5-3.50v-4.38zM12 2C6.48 2 2 6.48 2 12c0 2.37.83 4.56 2.22 6.31.25.31.75.32 1.01.01l1.1-1.28c.24-.28.22-.69-.03-.95C5.41 15.2 4.9 13.72 4.9 12c0-3.91 3.18-7.1 7.1-7.1s7.1 3.19 7.1 7.1c0 1.72-.51 3.2-1.4 4.09-.25.26-.27.67-.03.95l1.1 1.28c.26.31.76.3 1.01-.01C21.17 16.56 22 14.37 22 12c0-5.52-4.48-10-10-10z" />
                    </svg>
                    <!-- Power -->
                    <svg class="header-icon" viewBox="0 0 24 24">
                        <path
                            d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z" />
                    </svg>
                </div>
            </div>
        </header>

        <div class="patient-grid" id="grid">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <script>
        // Data exactly from image
        const PATIENTS = [
            { name: "Sumitra Bhatt", id: "P034413", bili: 12, temp: 101, spo2: 98, hr: 98, critical: true },
            { name: "Kausar Sheikh", id: "P034415", bili: 9, temp: 99, spo2: 99, hr: 78, critical: false },
            { name: "Aradhya Verma", id: "P034455", bili: 9, temp: 99, spo2: 98, hr: 83, critical: false },
            { name: "Meghna Shukla", id: "P034465", bili: 14, temp: 99, spo2: 98, hr: 98, critical: true },
            { name: "Sunanda Bishnoi", id: "P034491", bili: 5, temp: 99, spo2: 98, hr: 98, critical: false },
            { name: "Navya Sen", id: "P034512", bili: 6, temp: 99, spo2: 98, hr: 98, critical: false },
            { name: "Dhara Gupta", id: "P034532", bili: 7, temp: 99, spo2: 98, hr: 98, critical: false },
            { name: "Jyoti Bhowmick", id: "P034611", bili: 6, temp: 99, spo2: 98, hr: 98, critical: false },
            { name: "Yogita Bisht", id: "P034619", bili: 19, temp: 98, spo2: 96, hr: 95, critical: true },
            { name: "Tithi Jhunjunuwala", id: "P034628", bili: 9, temp: 98, spo2: 98, hr: 98, critical: false },
            { name: "Zoya Rehman", id: "P034682", bili: 11, temp: 99, spo2: 98, hr: 98, critical: true },
            { name: "Tanisha D'souza", id: "P034701", bili: 8, temp: 98, spo2: 98, hr: 92, critical: false }
        ];

        // Icons
        // Icons - Updated to match request
        const ICON_LIVER = '<svg viewBox="0 0 24 24"><path d="M18.66,4.68C17.57,4.09,16.27,3.95,15.1,4.27C14.07,3.48,12.78,3,11.38,3c-3.54,0-6.64,2.67-7.25,6.33L4,10c-0.28,1.67,0.25,3.38,1.44,4.57l0.72,0.72 c1.19,1.19,2.89,1.72,4.57,1.44l0.67-0.12C13.25,16.44,14.65,16,16,16c2.21,0,4-1.79,4-4C20,9.15,19.5,6.58,18.66,4.68z M7.05,10.66 C6.84,9.39,7.91,8.23,9.2,8.22C9.92,8.21,10.5,8.8,10.5,9.52c0,0.48-0.24,0.92-0.63,1.18c-0.56,0.38-0.78,1.08-0.53,1.71 c0.25,0.63,0.92,0.98,1.58,0.83c1.07-0.25,1.96-1.07,2.07-2.17C13.19,8.96,11.39,7,9.22,7.02C6.54,7.04,4.28,9.13,4.04,11.8 c-0.03,0.34,0.22,0.64,0.56,0.67C4.94,12.51,5.24,12.26,5.27,11.92C5.37,11.47,5.97,11.08,6.4,11.29C6.83,11.5,6.93,12.11,6.59,12.45 l-0.71,0.71c-0.84,0.84-1.22,2.05-1.01,3.23l0.39-0.07l-0.67,0.12C5.64,15.25,6.26,14.03,7.5,13.25L7.05,10.66z"/></svg>';

        const ICON_LUNG = '<svg viewBox="0 0 24 24"><path d="M7.74,5.43c0,0-0.93,2.94-0.1,4.92c0.67,1.59,2.2,2.39,3.11,1.97c0.91-0.42,1.25-2.09,1.25-2.09 s1.5,1.25,1.25,2.92c-0.25,1.67-1.42,3.17-3.33,3.75c-1.92,0.58-4.75-0.75-5.92-2.5S3,9.1,4.5,7.18C6,5.27,7.74,5.43,7.74,5.43z M16.26,5.43c0,0,0.93,2.94,0.1,4.92c-0.67,1.59-2.2,2.39-3.11,1.97c-0.91-0.42-1.25-2.09-1.25-2.09s-1.5,1.25-1.25,2.92 c0.25,1.67,1.42,3.17,3.33,3.75c1.92,0.58,4.75-0.75,5.92-2.5S19,9.1,17.5,7.18C16,5.27,16.26,5.43,16.26,5.43z"/></svg>';
        const ICON_TEMP = '<svg viewBox="0 0 24 24"><path d="M15 13V5c0-1.66-1.34-3-3-3S9 3.34 9 5v8c-1.21.91-2 2.37-2 4 0 2.76 2.24 5 5 5s5-2.24 5-5c0-1.63-.79-3.09-2-4zm-4-8c0-.55.45-1 1-1s1 .45 1 1h-1v1h1v2h-1v1h1v2h-2V5z"/></svg>';
        const ICON_HEART = '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';

        function createCard(p) {
            const card = document.createElement('div');
            card.className = `patient-card ${p.critical ? 'critical' : ''}`;

            const fmt = (num) => num.toString().padStart(2, '0');
            let biliClass = '';
            if (p.bili === 11) biliClass = 'text-yellow';
            else if (p.bili >= 10) biliClass = 'text-red';

            card.innerHTML = `
                <div class="card-header">
                    <div class="patient-name"><span>w/o</span> ${p.name}</div>
                    <div class="patient-id">Patient ID: ${p.id}</div>
                </div>
                <div class="vitals-grid">
                    <!-- Liver -->
                    <div class="vital-item">
                        <div class="vital-icon liver">${ICON_LIVER}</div>
                        <div class="vital-data">
                            <div class="value-row">
                                <span class="vital-value ${biliClass}">${fmt(p.bili)}</span>
                                <span class="vital-unit">mg/dl</span>
                            </div>
                        </div>
                    </div>
                    <!-- Lung -->
                    <div class="vital-item">
                        <div class="vital-icon lung">${ICON_LUNG}</div>
                        <div class="vital-data">
                            <div class="value-row">
                                <span class="vital-value" id="spo2-${p.id}">${fmt(p.spo2)}</span>
                                <span class="vital-unit">%</span>
                            </div>
                        </div>
                    </div>
                    <!-- Temp -->
                    <div class="vital-item">
                        <div class="vital-icon temp">${ICON_TEMP}</div>
                        <div class="vital-data">
                            <div class="value-row">
                                <span class="vital-value">${p.temp}</span>
                                <span class="vital-unit">°F</span>
                            </div>
                        </div>
                    </div>
                    <!-- Heart -->
                    <div class="vital-item">
                        <div class="vital-icon heart">${ICON_HEART}</div>
                        <div class="vital-data">
                            <div class="value-row">
                                <span class="vital-value" id="hr-${p.id}">${fmt(p.hr)}</span>
                                <span class="vital-unit">bpm</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        const grid = document.getElementById('grid');
        PATIENTS.forEach(p => grid.appendChild(createCard(p)));

        setInterval(() => {
            const randomIdx = Math.floor(Math.random() * PATIENTS.length);
            const p = PATIENTS[randomIdx];

            const hrEl = document.getElementById(`hr-${p.id}`);
            const baseHr = p.hr;
            const fluctuation = Math.floor(Math.random() * 5) - 2;
            let newHr = baseHr + fluctuation;
            hrEl.innerText = newHr.toString().padStart(2, '0');

            if (Math.random() > 0.7) {
                const spoEl = document.getElementById(`spo2-${p.id}`);
                const baseSpo = p.spo2;
                const fluc = Math.floor(Math.random() * 3) - 1;
                let newSpo = baseSpo + fluc;
                if (newSpo > 100) newSpo = 100;
                spoEl.innerText = newSpo.toString().padStart(2, '0');
            }
        }, 1000);

        setInterval(() => {
            const now = new Date();
            const t = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('time').innerText = t;
        }, 1000);

    </script>
</body>

</html>
